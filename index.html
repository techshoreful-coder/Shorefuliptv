<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoreful IPTV - Premium</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap'); 

:root {
    --primary: #E50914;
    --primary-hover: #b80710;
    --bg-dark: #0a0a0c;
    --bg-panel: #141417;
    --text-main: #ffffff;
    --text-muted: #8e8e93;
    --border-color: rgba(255, 255, 255, 0.08);
    --active-glow: rgba(229, 9, 20, 0.5);
    --card-bg: #1c1c21;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

.bengali-text {
    font-family: 'Hind Siliguri', sans-serif;
}

body {
    background: var(--bg-dark);
    color: var(--text-main);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar {
    width: 6px;
    height: 6px;
}
::-webkit-scrollbar-thumb {
    background: var(--primary);
    border-radius: 10px;
}
::-webkit-scrollbar-track {
    background: var(--bg-dark);
}

/* ==================================
   SMOOTH FADE IN ANIMATION
================================== */
.fade-in {
    animation: fadeIn 0.6s ease-in-out;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* ==================================
   SKELETON LOADING ANIMATIONS
================================== */
@keyframes skeleton-dark {
    0% { background-color: rgba(255, 255, 255, 0.03); }
    50% { background-color: rgba(255, 255, 255, 0.1); }
    100% { background-color: rgba(255, 255, 255, 0.03); }
}

@keyframes skeleton-light {
    0% { background-color: rgba(0, 0, 0, 0.05); }
    50% { background-color: rgba(0, 0, 0, 0.15); }
    100% { background-color: rgba(0, 0, 0, 0.05); }
}

.skeleton {
    animation: skeleton-dark 1.5s infinite ease-in-out;
    border-radius: 8px;
}

body.lightmode .skeleton {
    animation: skeleton-light 1.5s infinite ease-in-out;
}

.skeleton-tab {
    width: 100%;
    height: 45px;
    margin-bottom: 8px;
    border-radius: 10px;
}
.skeleton-card {
    background: transparent !important;
    border: 1px solid var(--border-color);
}
.skeleton-img {
    height: 100px;
    width: 100%;
    border-radius: 0;
}
.skeleton-text {
    height: 12px;
    width: 70%;
    margin: 15px auto;
    border-radius: 4px;
}
.skeleton-player {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 70px;
    background: rgba(10, 10, 12, 0.85);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; border-bottom: 1px solid var(--border-color); z-index: 10000;
}
.brand {
    font-size: 24px; font-weight: 800; color: var(--primary);
    text-transform: uppercase; letter-spacing: 1.5px;
    display: flex; align-items: center; gap: 10px;
}
.mobile-menu-btn {
    display: none; background: none; border: none; color: var(--text-main);
    font-size: 24px; cursor: pointer; margin-right: 5px; transition: 0.3s;
}
.mobile-menu-btn:hover { color: var(--primary); }
.brand i.logo-icon { font-size: 28px; }

.search-container { flex: 1; max-width: 400px; margin: 0 20px; position: relative; }
.search-container input {
    width: 100%; background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border-color); color: white;
    padding: 10px 15px 10px 40px; border-radius: 20px;
    font-size: 14px; outline: none; transition: 0.3s ease;
}
.search-container input:focus {
    border-color: var(--primary); background: rgba(255, 255, 255, 0.1);
    box-shadow: 0 0 15px rgba(229, 9, 20, 0.2);
}
.search-container i {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);
}
.nav-actions { display: flex; align-items: center; gap: 15px; }
#themeToggle {
    background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-color);
    color: white; width: 40px; height: 40px; border-radius: 50%;
    cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.3s;
}
#themeToggle:hover { background: var(--primary); border-color: var(--primary); }

.mobile-overlay {
    position: fixed; top: 70px; left: 0; width: 100%; height: calc(100vh - 70px);
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); z-index: 9998;
    opacity: 0; pointer-events: none; transition: 0.3s ease;
}
.mobile-overlay.active { opacity: 1; pointer-events: auto; }

/* MAIN LAYOUT */
.layout { display: flex; margin-top: 70px; min-height: calc(100vh - 70px); }

/* SIDEBAR */
.sidebar {
    width: 250px; background: var(--bg-panel); border-right: 1px solid var(--border-color);
    position: fixed; height: calc(100vh - 70px); overflow-y: auto; padding: 20px 15px;
    transition: 0.3s ease-in-out; z-index: 9999;
}
.sidebar-title {
    font-size: 12px; text-transform: uppercase; color: var(--text-muted);
    letter-spacing: 1px; margin-bottom: 15px; padding-left: 10px; font-weight: 600;
}
.group-tab {
    display: flex; align-items: center; gap: 12px; padding: 12px 15px;
    border-radius: 10px; color: var(--text-muted); cursor: pointer; transition: 0.3s ease;
    margin-bottom: 5px; font-size: 14px; font-weight: 500; border: none; background: transparent;
    width: 100%; text-align: left;
}
.group-tab i { font-size: 18px; width: 20px; text-align: center; }
.group-tab:hover { background: rgba(255, 255, 255, 0.05); color: white; }
.group-tab.active-tab { background: var(--primary); color: white; box-shadow: 0 4px 15px var(--active-glow); }

/* MAIN CONTENT */
.main-content { flex: 1; margin-left: 250px; padding: 20px; transition: 0.3s; width: calc(100% - 250px); }

/* PLAYER AREA */
.player-wrapper {
    width: 100%; background: #000; border-radius: 16px; overflow: hidden; position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color);
    margin-bottom: 30px; aspect-ratio: 16/9; max-height: 65vh;
}
.player-wrapper:fullscreen { max-height: none; border-radius: 0; border: none; }
.player-wrapper:-webkit-full-screen { max-height: none; border-radius: 0; border: none; }

video { width: 100%; height: 100%; object-fit: contain; background: #000; display: none; }

/* MINIMAL BUFFERING SPINNER WITH TEXT */
.minimal-buffering {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
    display: flex; justify-content: center; align-items: center;
    z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s ease;
}
.minimal-buffering.active { opacity: 1; pointer-events: auto; }
.loading-content-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 15px;
}
.spinner-ring {
    width: 40px; height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top: 3px solid var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
.loading-text-minimal {
    color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.5px; text-shadow: 0 2px 5px rgba(0,0,0,0.5);
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* CUSTOM CONTROLS & FULLSCREEN BTN */
.player-controls-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
    display: flex; justify-content: center; align-items: center; gap: 30px;
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 999; 
}
.player-wrapper:hover .player-controls-overlay,
.player-wrapper.active-ui .player-controls-overlay { opacity: 1; pointer-events: auto; }

.play-btn-custom {
    width: 70px; height: 70px; background: rgba(229, 9, 20, 0.9); border-radius: 50%;
    display: flex; justify-content: center; align-items: center; font-size: 24px; color: white;
    cursor: pointer; border: none; box-shadow: 0 0 20px var(--active-glow); transition: 0.2s transform;
}
.nav-btn-custom {
    width: 50px; height: 50px; background: rgba(255, 255, 255, 0.15); border-radius: 50%;
    display: flex; justify-content: center; align-items: center; font-size: 18px; color: white;
    cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s;
}
.play-btn-custom:hover, .nav-btn-custom:hover { transform: scale(1.1); background: var(--primary); border-color: var(--primary); }

.fullscreen-btn {
    position: absolute;
    bottom: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    width: 42px;
    height: 42px;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    cursor: pointer;
    z-index: 1001;
    opacity: 0;
    transition: 0.3s ease;
    pointer-events: none;
    backdrop-filter: blur(4px);
}
.player-wrapper:hover .fullscreen-btn,
.player-wrapper.active-ui .fullscreen-btn {
    opacity: 1; pointer-events: auto;
}
.fullscreen-btn:hover {
    background: var(--primary);
    border-color: var(--primary);
    transform: scale(1.1);
}

/* CHANNEL GRID */
.section-header { font-size: 20px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
.section-header::before { content: ''; display: block; width: 4px; height: 20px; background: var(--primary); border-radius: 4px; }
.channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding-bottom: 40px; }

.channel-card {
    background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative;
    cursor: pointer; border: 1px solid transparent; transition: all 0.3s ease;
    display: flex; flex-direction: column;
}
.channel-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
.channel-card.active { border-color: var(--primary); box-shadow: 0 0 15px var(--active-glow); }

.card-img-wrapper { height: 100px; background: #111; display: flex; justify-content: center; align-items: center; padding: 15px; position: relative; }
.card-img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); }
.card-info { padding: 12px; background: rgba(0,0,0,0.2); text-align: center; }
.card-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }

.fav-btn {
    position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; color: white;
    width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
    cursor: pointer; font-size: 13px; backdrop-filter: blur(4px); transition: 0.2s; z-index: 2;
}
.fav-btn:hover { transform: scale(1.15); }
.fav-btn.favorited { color: var(--primary); }

/* FOOTER */
.bottom-section { margin-top: 20px; padding: 30px; background: var(--bg-panel); border-radius: 16px; text-align: center; border: 1px solid var(--border-color); }
.social-links { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
.social-links a { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-size: 18px; text-decoration: none; transition: 0.3s; }
.social-links a.fb { background: #1877F2; } .social-links a.tg { background: #229ED9; }
.social-links a:hover { transform: translateY(-3px); filter: brightness(1.2); }
.footer-text { margin-top: 20px; font-size: 13px; color: var(--text-muted); }
.footer-text span { color: var(--primary); font-weight: bold; }

/* LIGHT MODE OVERRIDES */
body.lightmode {
    --bg-dark: #f4f4f9; --bg-panel: #ffffff; --text-main: #111111;
    --text-muted: #666666; --border-color: #e0e0e0; --card-bg: #ffffff;
}
body.lightmode .search-container input { color: #111; background: #f0f0f0; }
body.lightmode .card-info { background: #f8f8f8; }
body.lightmode .card-title { color: #333; }
body.lightmode .navbar { background: rgba(255,255,255,0.95); }
body.lightmode .player-wrapper { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
body.lightmode .mobile-menu-btn { color: #111; }
body.lightmode .minimal-buffering { background: rgba(255, 255, 255, 0.8); }
body.lightmode .loading-text-minimal { color: #111; text-shadow: none; }

/* RESPONSIVE */
@media (max-width: 992px) {
    .mobile-menu-btn { display: block; }
    .sidebar { left: -300px; width: 260px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
    .sidebar.active { left: 0; }
    .main-content { margin-left: 0; width: 100%; padding: 15px; }
    .player-wrapper { position: sticky; top: 70px; z-index: 9997; margin-bottom: 20px; border-radius: 8px; }
    .search-container { display: none; }
    .mobile-search { display: block; margin-bottom: 15px; position: relative; }
    .mobile-search input { width: 100%; background: var(--bg-panel); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px 15px 12px 40px; border-radius: 12px; outline: none; }
    .mobile-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
    .card-img-wrapper { height: 75px; }
}
@media (min-width: 993px) { .mobile-search { display: none; } }
#topBtn {
    position: fixed; right: 25px; bottom: 25px; width: 45px; height: 45px; background: var(--primary);
    color: white; border: none; border-radius: 50%; font-size: 18px; cursor: pointer;
    box-shadow: 0 5px 15px rgba(229,9,20,0.4); display: none; z-index: 99999; transition: 0.3s;
}
#topBtn:hover { transform: translateY(-5px); background: var(--primary-hover); }
</style>
</head>
<body>

<header class="navbar">
    <div class="brand">
        <button id="mobileMenuBtn" class="mobile-menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <i class="fas fa-play-circle logo-icon"></i>
        <span>শরিফুল আইপি টিভি</span>
    </div>
    
    <div class="search-container">
        <i class="fas fa-search"></i>
        <input type="text" id="desktopSearch" placeholder="Search channels..." onkeyup="searchChannels(this.value)">
    </div>
    
    <div class="nav-actions">
        <button id="themeToggle"><i class="fas fa-sun"></i></button>
    </div>
</header>

<div class="mobile-overlay" id="mobileOverlay" onclick="toggleMenu()"></div>

<div class="layout">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title">Categories</div>
        <div id="groupTabs">
            <!-- Skeleton Tabs -->
        </div>
    </aside>

    <main class="main-content">
        
        <div class="mobile-search">
            <i class="fas fa-search"></i>
            <input type="text" id="mobileSearch" placeholder="Search channels..." onkeyup="searchChannels(this.value)">
        </div>

        <div class="player-wrapper" id="playerContainer">
            <div class="skeleton skeleton-player" id="playerSkeleton"></div>
            
            <video id="video" autoplay playsinline controls></video>
            
            <div class="minimal-buffering" id="loadingOverlay">
                <div class="loading-content-wrapper">
                    <div class="spinner-ring" id="spinnerIcon"></div>
                    <div class="loading-text-minimal bengali-text" id="loadingText">অনুগ্রহ করে অপেক্ষা করুন সার্ভারের সাথে কানেক্ট হচ্ছে...</div>
                </div>
            </div>

            <!-- Fullscreen Button inside Wrapper -->
            <button class="fullscreen-btn" id="fsBtn" onclick="toggleFullScreen()" title="Full Screen">
                <i class="fas fa-expand"></i>
            </button>

            <div class="player-controls-overlay" id="customControls">
                <button class="nav-btn-custom" onclick="prevChannel()"><i class="fas fa-backward-step"></i></button>
                <button class="play-btn-custom" onclick="togglePlay()" id="playPauseBtn"><i class="fas fa-pause"></i></button>
                <button class="nav-btn-custom" onclick="nextChannel()"><i class="fas fa-forward-step"></i></button>
            </div>
        </div>

        <h2 class="section-header" id="currentCategoryTitle">All Channels</h2>
        <div class="channel-grid fade-in" id="channelGrid">
            <!-- Skeleton Grid -->
        </div>

        <div class="bottom-section">
            <h3>Connect With Us</h3>
            <p class="bengali-text" style="font-size: 14px; color: var(--text-muted); margin-top: 5px;">আমার টিভি সম্পর্কে মতামত জানাতে</p>
            <div class="social-links">
                <a href="#" target="_blank" class="tg"><i class="fab fa-telegram-plane"></i></a>
                <a href="https://www.facebook.com/share/1GGVpi4anC/" target="_blank" class="fb"><i class="fab fa-facebook-f"></i></a>
            </div>
            <div class="footer-text">
                © কারিগরি সহযোগিতায় শরিফুল ইসলাম 
            </div>
        </div>
        
    </main>
</div>

<button id="topBtn" onclick="window.scrollTo({top:0, behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>

<script>
const playlist = 'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let filteredChannels = [];
let currentIndex = 0;
let currentGroup = 'All';
let favorites = JSON.parse(localStorage.getItem('premium_favorites') || '[]');

const groupsConfig = [
    { name: 'All', icon: 'fa-border-all' },
    { name: 'Favorites', icon: 'fa-heart' },
    { name: 'Bangla', icon: 'fa-language' },
    { name: 'Sports', icon: 'fa-futbol' },
    { name: 'News', icon: 'fa-newspaper' },
    { name: 'Movies', icon: 'fa-film' },
    { name: 'Entertainment', icon: 'fa-tv' },
    { name: 'Music', icon: 'fa-music' },
    { name: 'Kids', icon: 'fa-child' },
    { name: 'International', icon: 'fa-globe' },
    { name: 'Others', icon: 'fa-ellipsis-h' }
];

/* INITIALIZE */
document.addEventListener("DOMContentLoaded", () => {
    initTheme();
    showSkeletons(); 
    loadPlaylist();
    setupPlayerUI();
    setupVideoEvents();
    setupFullScreenListener();
});

/* SHOW SKELETONS */
function showSkeletons() {
    const tabsContainer = document.getElementById('groupTabs');
    const gridContainer = document.getElementById('channelGrid');
    
    let tabsHtml = '';
    for(let i=0; i<8; i++){
        tabsHtml += `<div class="skeleton skeleton-tab"></div>`;
    }
    tabsContainer.innerHTML = tabsHtml;

    let gridHtml = '';
    for(let i=0; i<12; i++){
        gridHtml += `
        <div class="channel-card skeleton-card">
            <div class="skeleton skeleton-img"></div>
            <div class="card-info" style="background: transparent;">
                <div class="skeleton skeleton-text"></div>
            </div>
        </div>`;
    }
    gridContainer.innerHTML = gridHtml;
}

/* VIDEO BUFFERING EVENTS */
function setupVideoEvents() {
    const video = document.getElementById('video');
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const spinnerIcon = document.getElementById('spinnerIcon');

    video.addEventListener('playing', () => {
        overlay.classList.remove('active');
    });
    
    video.addEventListener('waiting', () => {
        loadingText.innerText = 'সার্ভারের সাথে কানেক্ট হচ্ছে...';
        spinnerIcon.style.display = 'block';
        overlay.classList.add('active');
    });
    
    video.addEventListener('error', () => {
        loadingText.innerText = 'ভিডিও লোড হতে সমস্যা হচ্ছে';
        spinnerIcon.style.display = 'none';
        setTimeout(() => overlay.classList.remove('active'), 2500);
    });
}

function toggleMenu() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('mobileOverlay').classList.toggle('active');
}

/* LOAD PLAYLIST */
function loadPlaylist() {
    fetch(playlist)
    .then(r => r.text())
    .then(data => {
        const lines = data.split('\n');
        for(let i=0; i<lines.length; i++){
            if(lines[i].startsWith('#EXTINF')){
                const info = lines[i];
                const url = lines[i+1] ? lines[i+1].trim() : '';
                if(!url) continue;

                const nameSplit = info.split(',');
                const name = nameSplit.length > 1 ? nameSplit[1].trim() : 'Unknown';
                let logo = ''; const match = info.match(/tvg-logo="(.*?)"/); if(match) logo = match[1];
                let group = 'Other'; const g = info.match(/group-title="(.*?)"/i); if(g) group = g[1];

                channels.push({ name, url, logo, group });
            }
        }

        document.getElementById('playerSkeleton').style.display = 'none';
        const videoElement = document.getElementById('video');
        videoElement.style.display = 'block';
        videoElement.classList.add('fade-in');

        buildTabs();
        filteredChannels = channels;
        renderChannels();

        if(channels.length > 0) playChannel(0, false);
    })
    .catch(err => console.error("Error loading playlist:", err));
}

function normalizeGroup(g){
    g = (g || '').toLowerCase();
    if(['bangla','bangladesh','indian bangla','inbangla'].includes(g)) return 'Bangla';
    if(g.includes('sport') || g.includes('world cup') || g.includes('fifa')) return 'Sports';
    if(g.includes('news')) return 'News';
    if(g.includes('movie')) return 'Movies';
    if(g.includes('music')) return 'Music';
    if(g.includes('kid')) return 'Kids';
    if(['english','hindi','urdhu'].includes(g)) return 'International';
    if(['entertainment','drama'].includes(g)) return 'Entertainment';
    return 'Others';
}

function buildTabs(){
    const tabsContainer = document.getElementById('groupTabs');
    tabsContainer.innerHTML = groupsConfig.map(g => `
        <button class="group-tab ${g.name === 'All' ? 'active-tab' : ''}" onclick="filterGroup('${g.name}', this)">
            <i class="fas ${g.icon}"></i>
            <span>${g.name}</span>
        </button>
    `).join('');
    tabsContainer.classList.add('fade-in');
}

function filterGroup(group, btnElement){
    currentGroup = group;
    document.querySelectorAll('.group-tab').forEach(el => el.classList.remove('active-tab'));
    if(btnElement) btnElement.classList.add('active-tab');
    document.getElementById('currentCategoryTitle').innerHTML = group === 'Favorites' ? '<i class="fas fa-heart" style="color:var(--primary)"></i> Your Favorites' : `${group} Channels`;

    if(group === 'All'){
        filteredChannels = channels;
    } else if(group === 'Favorites'){
        filteredChannels = channels.filter(c => favorites.includes(c.url));
    } else {
        filteredChannels = channels.filter(c => normalizeGroup(c.group) === group);
    }
    
    document.getElementById('desktopSearch').value = ''; document.getElementById('mobileSearch').value = '';
    
    const grid = document.getElementById('channelGrid');
    grid.classList.remove('fade-in');
    void grid.offsetWidth;
    grid.classList.add('fade-in');
    
    renderChannels();
    if(window.innerWidth <= 992) toggleMenu();
}

function searchChannels(query){
    query = query.toLowerCase();
    if(document.getElementById('desktopSearch').value !== query) document.getElementById('desktopSearch').value = query;
    if(document.getElementById('mobileSearch').value !== query) document.getElementById('mobileSearch').value = query;

    const cards = document.querySelectorAll('.channel-card');
    filteredChannels.forEach((ch, index) => {
        if(cards[index]) {
            if(ch.name.toLowerCase().includes(query)) cards[index].style.display = 'flex';
            else cards[index].style.display = 'none';
        }
    });
}

function renderChannels(){
    const grid = document.getElementById('channelGrid');
    grid.innerHTML = '';
    
    if(filteredChannels.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:var(--text-muted);">No channels found.</div>`;
        return;
    }

    filteredChannels.forEach((ch) => {
        const div = document.createElement('div');
        div.className = 'channel-card';
        if(channels[currentIndex] && channels[currentIndex].url === ch.url) div.classList.add('active');

        const isFav = favorites.includes(ch.url);
        const fallbackImg = "https://via.placeholder.com/200x100/111/fff?text=No+Logo";

        div.innerHTML = `
            <button class="fav-btn ${isFav ? 'favorited' : ''}" title="Favorite">
                <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
            </button>
            <div class="card-img-wrapper">
                <img src="${ch.logo || fallbackImg}" onerror="this.src='${fallbackImg}'" alt="${ch.name}">
            </div>
            <div class="card-info">
                <div class="card-title">${ch.name}</div>
            </div>
        `;

        div.onclick = (e) => {
            if(!e.target.closest('.fav-btn')) {
                const globalIndex = channels.findIndex(c => c.url === ch.url);
                playChannel(globalIndex, true);
            }
        };

        const favBtn = div.querySelector('.fav-btn');
        favBtn.onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(ch.url);
        };

        grid.appendChild(div);
    });
}

function toggleFavorite(url) {
    if(favorites.includes(url)) favorites = favorites.filter(x => x !== url);
    else favorites.push(url);
    
    localStorage.setItem('premium_favorites', JSON.stringify(favorites));
    if(currentGroup === 'Favorites') filteredChannels = channels.filter(c => favorites.includes(c.url));
    renderChannels();
}

function playChannel(index, scrollToTop = false){
    if(index < 0 || index >= channels.length) return;
    currentIndex = index;

    const video = document.getElementById('video');
    const channel = channels[index];
    
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const spinnerIcon = document.getElementById('spinnerIcon');

    loadingText.innerText = 'সার্ভারের সাথে কানেক্ট হচ্ছে...';
    spinnerIcon.style.display = 'block';
    overlay.classList.add('active');

    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(channel.url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(e => console.log("Autoplay prevented"));
            updatePlayPauseIcon();
        });
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                loadingText.innerText = 'ভিডিও লোড হতে সমস্যা হচ্ছে';
                spinnerIcon.style.display = 'none';
                setTimeout(() => overlay.classList.remove('active'), 2500);
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = channel.url;
        video.play().catch(e => console.log("Autoplay prevented"));
        updatePlayPauseIcon();
    }

    document.querySelectorAll('.channel-card').forEach(el => el.classList.remove('active'));
    renderChannels(); 
    if(scrollToTop && window.innerWidth <= 992) window.scrollTo({ top: 0, behavior: 'smooth' });
}

function nextChannel(){ let n = currentIndex + 1; if(n >= channels.length) n = 0; playChannel(n, false); }
function prevChannel(){ let p = currentIndex - 1; if(p < 0) p = channels.length - 1; playChannel(p, false); }
function togglePlay(){ const v = document.getElementById('video'); if(v.paused) v.play(); else v.pause(); updatePlayPauseIcon(); }

function updatePlayPauseIcon() {
    const video = document.getElementById('video');
    const btn = document.getElementById('playPauseBtn');
    btn.innerHTML = video.paused ? '<i class="fas fa-play" style="margin-left:4px;"></i>' : '<i class="fas fa-pause"></i>';
}

function setupPlayerUI() {
    const wrapper = document.getElementById('playerContainer');
    const video = document.getElementById('video');
    let timeout;
    function showControls() {
        wrapper.classList.add('active-ui'); clearTimeout(timeout);
        timeout = setTimeout(() => { if(!video.paused) wrapper.classList.remove('active-ui'); }, 3000);
    }
    wrapper.addEventListener('mousemove', showControls); wrapper.addEventListener('click', showControls);
    wrapper.addEventListener('touchstart', showControls); video.addEventListener('pause', () => wrapper.classList.add('active-ui'));
    video.addEventListener('play', showControls);
}

/* FULLSCREEN LOGIC */
function toggleFullScreen() {
    const player = document.getElementById('playerContainer');
    const video = document.getElementById('video');

    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
        if (player.requestFullscreen) {
            player.requestFullscreen();
        } else if (player.webkitRequestFullscreen) { /* Safari */
            player.webkitRequestFullscreen();
        } else if (video.webkitEnterFullscreen) { /* Fallback for iOS */
            video.webkitEnterFullscreen();
        } else if (player.msRequestFullscreen) { /* IE11 */
            player.msRequestFullscreen();
        }
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        } else if (document.webkitExitFullscreen) { /* Safari */
            document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) { /* IE11 */
            document.msExitFullscreen();
        }
    }
}

function setupFullScreenListener() {
    const events = ['fullscreenchange', 'webkitfullscreenchange', 'mozfullscreenchange', 'MSFullscreenChange'];
    events.forEach(evt => document.addEventListener(evt, updateFsIcon));
}

function updateFsIcon() {
    const fsBtn = document.getElementById('fsBtn');
    if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
        fsBtn.innerHTML = '<i class="fas fa-compress"></i>';
    } else {
        fsBtn.innerHTML = '<i class="fas fa-expand"></i>';
    }
}

function initTheme() {
    const btn = document.getElementById('themeToggle');
    if(localStorage.getItem('premium_theme') === 'light') {
        document.body.classList.add('lightmode'); btn.innerHTML = '<i class="fas fa-moon"></i>';
    } else {
        btn.innerHTML = '<i class="fas fa-sun"></i>';
    }
    btn.onclick = () => {
        document.body.classList.toggle('lightmode');
        const isLight = document.body.classList.contains('lightmode');
        localStorage.setItem('premium_theme', isLight ? 'light' : 'dark');
        btn.innerHTML = isLight ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    };
}

window.addEventListener('scroll', () => {
    document.getElementById('topBtn').style.display = window.scrollY > 400 ? 'block' : 'none';
});
</script>
