<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shoreful IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{
background:#000;
padding:6px;
text-align:center;
border-top:1px solid red;
border-bottom:1px solid red;
}

.header h1{
font-size:30px;
color:#ff1a1a;
text-shadow:0 0 15px red;
}

/* PLAYER */

.player-box{
position:relative;
width:100%;
background:black;
}

video{
width:100%;
height:250px;
background:black;
object-fit:fill;
}

/* CONTROLS */

.custom-controls{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
gap:15px;

z-index:999;
transition:.4s;

}

.control-btn{

width:58px;
height:58px;

border:none;
border-radius:50%;

background:red;
color:white;

font-size:22px;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

box-shadow:
0 0 15px rgba(255,0,0,.6);

}

/* SEARCH */

.search-box{
padding:2px;
}

.search-box input{

width:100%;
padding:8px;

font-size:14px;

border:none;
outline:none;

border-radius:12px;

background:#111;
color:white;

}

/* CHANNEL GRID */

.channel-grid{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:12px;
padding:12px;

}

/* CHANNEL */

.channel{

background:white;

border-radius:20px;

padding:4px;

height:75px;

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

border:2px solid #00cfff;

box-shadow:
0 0 12px rgba(0,207,255,.5);

transition:.3s;

}

.channel:hover{
transform:scale(1.03);
}

.channel img{

width:75%;
height:75%;
object-fit:fill;

}

/* ACTIVE */

.active{

border:3px solid #00ff84 !important;

box-shadow:
0 0 18px #00ff84,
0 0 28px rgba(0,255,132,.8);

}

/* CONTACT */

.contact-title{

text-align:center;

font-size:13px;
font-weight:bold;

margin-top:0px;
margin-bottom:0px;

color:white;

text-shadow:
0 0 10px red;

}

.social-box{

display:flex;
justify-content:center;
gap:10px;

padding-bottom:0px;

}

.social-box a{

width:35px;
height:35px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:20px;

text-decoration:none;
color:white;

}

.telegram{
background:#229ED9;
}

.facebook{
background:#1877F2;
}

/* FOOTER */

.footer{

text-align:center;

padding:2px;

font-size:12px;
font-weight:bold;

border-top:2px solid red;

}

.footer span{
color:red;
}
.player-box{
position:sticky;
top:0;
z-index:9999;
background:black;
}

.search-box{
position:sticky;
top:250px;
z-index:9998;
background:black;
}

.channel-grid{
overflow-y:auto;
padding-bottom:20px;
}

/* GROUP TABS */
.group-tabs{
display:flex;
overflow-x:auto;
gap:6px;
padding:6px;
background:#000;
position:sticky;
top:286px;
z-index:9997;
}
.group-tab{
background:#111;
color:white;
border:1px solid #00cfff;
border-radius:12px;
padding:6px 10px;
cursor:pointer;
white-space:nowrap;
}
.group-tab.active-tab{
background:#00cfff;
color:black;
font-weight:bold;
}


.fav-btn{
position:absolute;
top:2px;
right:4px;
font-size:18px;
z-index:5;
cursor:pointer;
}
.channel{
position:relative;
}

#themeToggle{
background:#4a0000;
color:#ffcc33;
border:1px solid #660000;
border-radius:14px;
padding:8px 12px;
cursor:pointer;
box-shadow:none;
}
body.darkmode .channel{
background:#121212 !important;
border-color:#333 !important;
box-shadow:none !important;
}
body.darkmode .channel img{
filter:brightness(.75) contrast(.95);
}


.channel-name{position:absolute;bottom:2px;left:0;right:0;font-size:10px;text-align:center;color:#fff;background:rgba(0,0,0,.6);border-radius:0 0 12px 12px;padding:1px;}
#loadingSpinner{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10000;font-size:22px;background:rgba(0,0,0,.35);padding:4px 8px;border-radius:50%;}
#topBtn{position:fixed;right:12px;bottom:28px;z-index:99999;display:none;width:30px;height:30px;border-radius:50%;border:none;background:#7a0000;color:white;font-size:12px;}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<div style="display:flex;justify-content:center;align-items:center;gap:12px;"><h1>Shoreful IPTV</h1><button id="themeToggle" title="Dark Mode">🌙</button></div>

</div>

<!-- PLAYER -->

<div class="player-box">

<video id="video"
autoplay
playsinline
controls>

</video>

<!-- CONTROLS -->

<div class="custom-controls">

<button class="control-btn"
onclick="prevChannel()">

⏮

</button>

<button class="control-btn"
onclick="togglePlay()">

⏯

</button>

<button class="control-btn"
onclick="nextChannel()">

⏭

</button>

</div>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"

id="search"

placeholder="Search Channel..."

onkeyup="searchChannels()">

</div>

<div class="group-tabs" id="groupTabs"></div>

<!-- CHANNELS -->

<div class="channel-grid"
id="channelGrid">

</div>

<!-- CONTACT -->

<h2 class="contact-title">

আমার টিভি সম্পর্কে মতামত জানাতে

</h2>

<div class="social-box">

<a href="https://t.me/shoreful"
target="_blank"
class="telegram">

<i class="fab fa-telegram-plane"></i>

</a>

<a href="https://www.facebook.com/shoreful"
target="_blank"
class="facebook">

<i class="fab fa-facebook-f"></i>

</a>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 <span>SHOREFUL IPTV</span>

</div>

<script>

/* PLAYLIST */

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let filteredChannels = [];
let currentIndex = 0;
let currentGroup='All';
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

/* LOAD PLAYLIST */

fetch(playlist)

.then(r=>r.text())

.then(data=>{

const lines =
data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];
const url = lines[i+1];
const name = info.split(',')[1];

let logo='';

const match =
info.match(/tvg-logo="(.*?)"/);

if(match){logo=match[1];}
let group='Other';
const g=info.match(/group-title="(.*?)"/i);
if(g){group=g[1];}

channels.push({
name,
url,
logo,
group
});

}

}

buildTabs();
filteredChannels = channels;
renderChannels();

if(channels.length>0){
playChannel(0);
}

});

/* RENDER */


function normalizeGroup(g){
g=(g||'').toLowerCase();
if(['bangla','bangladesh','indian bangla','inbangla'].includes(g)) return 'Bangla';
if(g.includes('world cup') || g.includes('fifa world cup')) return '🏆 FIFA World Cup';
if(g.includes('sport')) return 'Sports';
if(g.includes('news')) return 'News';
if(g.includes('movie')) return 'Movies';
if(g.includes('music')) return 'Music';
if(g.includes('kid')) return 'Kids';
if(['english','hindi','urdhu'].includes(g)) return 'International';
if(['entertainment','drama'].includes(g)) return 'Entertainment';
return 'Others';
}

function buildTabs(){
const tabs=document.getElementById('groupTabs');
const groups=['All','❤️ Favorites','Bangla','🏆 FIFA World Cup','Sports','News','Entertainment','Movies','Music','Kids','International','Others'];
tabs.innerHTML=groups.map(g=>`<button class="group-tab ${g==='All'?'active-tab':''}" onclick="filterGroup('${g}',this)">${g}</button>`).join('');
}

function filterGroup(group,btn){
currentGroup=group;
document.querySelectorAll('.group-tab').forEach(x=>x.classList.remove('active-tab'));
if(btn) btn.classList.add('active-tab');
if(group==='All'){
filteredChannels = channels;
}else if(group==='❤️ Favorites'){
filteredChannels = channels.filter(c=>favorites.includes(c.url));
}else{
filteredChannels = channels.filter(c=>normalizeGroup(c.group)===group);
}
renderChannels();
}

function renderChannels(){

const grid =
document.getElementById('channelGrid');

grid.innerHTML='';

filteredChannels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className='channel';

const fav = favorites.includes(ch.url) ? '❤️' : '🤍';

div.innerHTML=`
<div class="fav-btn">${fav}</div>
<img src="${ch.logo}"><div class="channel-name">${ch.name}</div>
`;

div.onclick=()=>playChannel(channels.indexOf(ch));


const favBtn = div.querySelector('.fav-btn');

favBtn.addEventListener('click', function(e){
e.stopPropagation();

if(favorites.includes(ch.url)){
favorites = favorites.filter(x=>x!==ch.url);
}else{
favorites.push(ch.url);
}

localStorage.setItem('favorites',JSON.stringify(favorites));

if(currentGroup==='❤️ Favorites'){
filteredChannels = channels.filter(c=>favorites.includes(c.url));
}

renderChannels();
});


grid.appendChild(div);

});

}


function toggleFavorite(event,url){

event.stopPropagation();

if(favorites.includes(url)){
favorites = favorites.filter(x=>x!==url);
}else{
favorites.push(url);
}

localStorage.setItem('favorites',JSON.stringify(favorites));

if(currentGroup==='❤️ Favorites'){
filteredChannels = channels.filter(c=>favorites.includes(c.url));
}

renderChannels();
}

/* PLAY */


function playChannel(index){

currentIndex=index;

const video =
document.getElementById('video');

const channel =
channels[index];

if(Hls.isSupported()){

const hls =
new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

hls.on(
Hls.Events.MANIFEST_PARSED,
function(){

video.play();

});

}

else{

video.src=channel.url;
video.play();

}

document.querySelectorAll('.channel')
.forEach(el=>{

el.classList.remove('active');

});

const cards = document.querySelectorAll('.channel');

cards.forEach((card,i)=>{
    if(
        filteredChannels[i] &&
        filteredChannels[i].url === channel.url
    ){
        card.classList.add('active');

        const rect = card.getBoundingClientRect();
const topLimit = 320; // player + tabs area

if(rect.top < topLimit || rect.bottom > window.innerHeight){
    card.scrollIntoView({
        behavior:'smooth',
        block:'nearest'
    });
}
    }
});

}

/* NEXT */

function nextChannel(){

currentIndex++;

if(currentIndex>=channels.length){

currentIndex=0;

}

playChannel(currentIndex);

}

/* PREV */

function prevChannel(){

currentIndex--;

if(currentIndex<0){

currentIndex=
channels.length-1;

}

playChannel(currentIndex);

}

/* PLAY PAUSE */

function togglePlay(){

const video =
document.getElementById('video');

if(video.paused){

video.play();

}

else{

video.pause();

}

}

/* SEARCH */

function searchChannels(){

const input =
document.getElementById('search')
.value.toLowerCase();

const cards =
document.querySelectorAll('.channel');

filteredChannels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

cards[index]
.style.display='flex';

}

else{

cards[index]
.style.display='none';

}

});

}

/* AUTO HIDE */

const controls =
document.querySelector('.custom-controls');

function showUI(){

controls.style.opacity='1';

setTimeout(()=>{

controls.style.opacity='0';

},2000);

}

showUI();

document.querySelector('.player-box')
.addEventListener('click',()=>{

showUI();

});

</script>


<script>
(function(){
const btn=document.getElementById('themeToggle');
if(!btn) return;

if(localStorage.getItem('darkmode')==='on'){
 document.body.classList.add('darkmode');
}

btn.onclick=function(){
 document.body.classList.toggle('darkmode');
 localStorage.setItem('darkmode',
 document.body.classList.contains('darkmode')?'on':'off');
};
})();
</script>

<button id="topBtn">↑</button>

<script>
document.getElementById('topBtn').onclick=()=>window.scrollTo({top:0,behavior:'smooth'});
window.addEventListener('scroll',()=>{
document.getElementById('topBtn').style.display=window.scrollY>300?'block':'none';
});

</script>

</body>
</html>
